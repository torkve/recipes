services:
  recipes:
    build: .
    image: recipes:latest
    container_name: recipes
    restart: unless-stopped
    ports:
      - "${RECIPES_PORT:-8080}:8080"
    environment:
      # First-run admin bootstrap (required). Set these in a local .env file.
      ADMIN_USERNAME: ${ADMIN_USERNAME:?set ADMIN_USERNAME in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      RECIPES_SITE_NAME: ${RECIPES_SITE_NAME:-Семейная кулинарная книга}
      # Set true when serving over HTTPS (behind a TLS proxy).
      RECIPES_SECURE_COOKIES: ${RECIPES_SECURE_COOKIES:-false}
      # iCloud Notes sync (off by default; requires Apple ID + 2FA at runtime).
      RECIPES_ICLOUD_ENABLED: ${RECIPES_ICLOUD_ENABLED:-false}
      RECIPES_ICLOUD_PULL_MINUTES: ${RECIPES_ICLOUD_PULL_MINUTES:-15}
      RECIPES_ICLOUD_SRP_VARIANT: ${RECIPES_ICLOUD_SRP_VARIANT:-1}
      # Semantic (hybrid) search. Empty = keyword-only. To enable, set
      # RECIPES_EMBED_URL=http://embedder:80 in .env and start the embedder with
      # `docker compose --profile semantic up`.
      RECIPES_EMBED_URL: ${RECIPES_EMBED_URL:-}
      RECIPES_EMBED_MODEL: ${RECIPES_EMBED_MODEL:-intfloat/multilingual-e5-small}
      RECIPES_EMBED_DIM: ${RECIPES_EMBED_DIM:-384}
      RECIPES_EMBED_BACKFILL_MINUTES: ${RECIPES_EMBED_BACKFILL_MINUTES:-5}
    volumes:
      - recipes-data:/data

  # Self-hosted embedding model for semantic search. Opt-in: only started with
  # `docker compose --profile semantic up`. The model downloads on first boot
  # into the embedder-models volume (rebuildable, no backup needed).
  embedder:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    container_name: recipes-embedder
    restart: unless-stopped
    profiles: ["semantic"]
    command: ["--model-id", "${RECIPES_EMBED_MODEL:-intfloat/multilingual-e5-small}"]
    volumes:
      - embedder-models:/data

volumes:
  recipes-data:
  embedder-models:
