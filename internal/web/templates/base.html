{{define "base"}}<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{if .Title}}{{.Title}} — {{end}}{{.SiteName}}</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/" aria-label="На главную">
      <img class="logo-mark" src="/static/img/logo.svg" width="40" height="40" alt="" aria-hidden="true">
      <span class="site-name">{{.SiteName}}</span>
    </a>
    <nav class="header-actions">
      {{if .User}}
        <div class="menu" id="account-menu">
          <button type="button" class="btn menu-toggle" aria-haspopup="true" aria-expanded="false" aria-controls="account-menu-panel">👤 {{.User.Username}}</button>
          <div class="menu-panel" id="account-menu-panel" role="menu" hidden>
            <a class="menu-item" role="menuitem" href="/admin/recipes/new">Добавить рецепт</a>
            <a class="menu-item" role="menuitem" href="/admin/recipes">Управление рецептами</a>
            <a class="menu-item" role="menuitem" href="/admin/categories">Категории</a>
            {{if .ICloudEnabled}}<a class="menu-item" role="menuitem" href="/admin/sync">iCloud-синхронизация</a>{{end}}
            <form class="inline menu-item-form" method="post" action="/admin/logout"><button type="submit" class="menu-item btn-link" role="menuitem">Выйти</button></form>
          </div>
        </div>
      {{else}}
        <a class="btn" href="/admin/login">Вход</a>
      {{end}}
    </nav>
  </header>
  <main class="container">
    {{block "content" .}}{{end}}
  </main>
  <footer class="site-footer"><small>{{.SiteName}}</small></footer>
  <script src="/static/js/app.js" defer></script>
  {{block "scripts" .}}{{end}}
</body>
</html>{{end}}
